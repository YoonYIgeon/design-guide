<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>사내 관리자 콘솔</title>
    <!--
      첫 페인트 전에 저장된 테마를 적용해 새로고침 시 라이트→다크 깜빡임(FOUC)을 방지합니다.
      키("au-theme")는 src/App.tsx 의 THEME_STORAGE_KEY 와 일치해야 합니다.
    -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("au-theme");
          document.documentElement.setAttribute("data-theme", t === "dark" ? "dark" : "light");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
